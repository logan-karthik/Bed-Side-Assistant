<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Bedside Assistant</title>
    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --apollo-saffron: #FDB931;
            --apollo-teal: #2582A1;
            --launcher-size: 60px;
            --shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: #f4f6f8; 
            height: 100vh;
            overflow: hidden;
        }

        /* --- 1. LAUNCHER BUTTON --- */
        .launcher-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: var(--launcher-size);
            height: var(--launcher-size);
            background: var(--apollo-teal);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(37, 130, 161, 0.4);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s, background 0.3s;
        }

        .launcher-btn:hover { transform: scale(1.1); }
        .launcher-btn.is-open { background: #ef4444; transform: rotate(90deg); }

        .launcher-icon { width: 30px; height: 30px; fill: white; transition: all 0.3s ease; }
        .icon-close { display: none; }
        .is-open .icon-mic { display: none; }
        .is-open .icon-close { display: block; }

        /* --- 2. VOICE WIDGET (Compact Version) --- */
        .assistant-widget {
            position: fixed;
            bottom: 110px;
            right: 30px;
            width: 320px;
            /* Height is auto now, depending on content */
            min-height: 300px; 
            background: white;
            border-radius: 25px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            
            /* Animation hidden state */
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transform-origin: bottom right;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .assistant-widget.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: all;
        }

        /* --- HEADER --- */
        .chat-header {
            background: linear-gradient(135deg, var(--apollo-teal), #1a6b85);
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 45px; height: 45px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: var(--apollo-teal);
        }

        .header-info h3 { font-size: 1.1rem; margin-bottom: 2px; }
        .header-info p { font-size: 0.8rem; opacity: 0.9; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; }

        /* --- MAIN CONTENT AREA --- */
        .visualizer-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: #fff;
        }

        /* Status Text (e.g. Listening...) */
        .status-text {
            font-size: 1.1rem;
            color: #555;
            font-weight: 600;
            margin-bottom: 30px;
            text-align: center;
            height: 25px; /* Fixed height to prevent jumping */
        }

        /* Large Central Mic */
        .mic-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: var(--apollo-teal);
            color: white;
            cursor: pointer;
            z-index: 2;
            box-shadow: 0 10px 25px rgba(37, 130, 161, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn svg { width: 35px; height: 35px; fill: white; }
        
        /* Hover Effect */
        .mic-btn:hover { transform: scale(1.05); }

        /* Rings Animation */
        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--apollo-saffron);
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* STATE: LISTENING (Red Pulse) */
        .listening .mic-btn { background: #ef4444; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4); }
        .listening .ring { animation: ripple 1.5s infinite; }
        .listening .ring:nth-child(2) { animation-delay: 0.4s; }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 0.6; }
            100% { transform: scale(2.2); opacity: 0; }
        }

    </style>
</head>
<body>

    <!-- 1. LAUNCHER BUTTON -->
    <button class="launcher-btn" id="launcherBtn" onclick="toggleWidget()">
        <svg class="launcher-icon icon-mic" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        <svg class="launcher-icon icon-close" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>

    <!-- 2. WIDGET CARD -->
    <div class="assistant-widget" id="widget">
        <!-- Header -->
        <div class="chat-header">
            <div class="avatar">🏥</div>
            <div class="header-info">
                <h3>Apollo Bedside</h3>
                <p><span class="status-dot"></span> Online</p>
            </div>
        </div>

        <!-- Main Visual Area (No Text Bubbles) -->
        <div class="visualizer-area">
            <div class="status-text" id="statusText">Tap mic to speak</div>
            
            <div class="mic-container" id="micContainer">
                <div class="ring"></div>
                <div class="ring"></div>
                <button class="mic-btn" id="voiceBtn">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // DOM Elements
        const widget = document.getElementById('widget');
        const launcherBtn = document.getElementById('launcherBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const micContainer = document.getElementById('micContainer');
        const statusText = document.getElementById('statusText');

        // Speech API Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        const synth = window.speechSynthesis;

        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        // Variables
        let currentSessionId = null;
        let isConversationActive = false;
        let isListening = false;
        let isWidgetOpen = false;

        // --- 1. TOGGLE WIDGET ---
        function toggleWidget() {
            isWidgetOpen = !isWidgetOpen;
            if (isWidgetOpen) {
                widget.classList.add('active');
                launcherBtn.classList.add('is-open');
                // Auto-start only if not active
                if(!isConversationActive) startConversation();
            } else {
                widget.classList.remove('active');
                launcherBtn.classList.remove('is-open');
                // Optional: Stop everything on close
                stopListening();
                synth.cancel();
            }
        }

        // --- 2. UPDATE UI STATUS ---
        function setStatus(text, state) {
            statusText.innerText = text;
            
            if (state === 'listening') {
                micContainer.classList.add('listening');
            } else {
                micContainer.classList.remove('listening');
            }
        }

        // --- 3. SPEAK (TTS) ---
        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            
            // NOTE: We do NOT add text to the screen anymore.
            setStatus("Speaking...", "default");

            utterance.onend = () => {
                // Logic: If conversation is active and not ended, auto-listen
                if (isConversationActive && !text.includes("Conversation Ended") && isWidgetOpen) {
                    setStatus("Your turn...", "listening");
                    startListening();
                } else if (text.includes("Conversation Ended")) {
                     setStatus("Tap mic to start", "default");
                } else {
                     setStatus("Tap mic to reply", "default");
                }
            };
            
            synth.speak(utterance);
        }

        // --- 4. LISTEN (STT) ---
        function startListening() {
            try {
                isListening = true;
                recognition.start();
                setStatus("Listening...", "listening");
            } catch (e) {
                console.log("Mic busy");
            }
        }

        function stopListening() {
            isListening = false;
            recognition.stop();
            // Don't set status here immediately, wait for processing
        }

        // --- 5. BACKEND CALLS ---
        async function startConversation() {
            setStatus("Connecting...", "default");
            
            try {
                const response = await fetch('http://127.0.0.1:5000/start_conversation', { method: 'POST' });
                const data = await response.json();
                
                if (data.success) {
                    currentSessionId = data.session_id;
                    isConversationActive = true;
                    speak(data.response_text);
                }
            } catch (error) {
                setStatus("Connection Failed", "default");
            }
        }

        async function processInput(text) {
            setStatus("Thinking...", "default"); // Visual feedback while processing
            
            try {
                const response = await fetch('http://127.0.0.1:5000/process_conversation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query: text,
                        session_id: currentSessionId
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    speak(data.response_text);
                    
                    if (data.conversation_ended) {
                        isConversationActive = false;
                        // Status will update in speak.onend
                    }
                }
            } catch (e) {
                setStatus("Server Error", "default");
            }
        }

        // --- 6. EVENTS ---
        voiceBtn.addEventListener('click', () => {
            if (!isConversationActive) {
                startConversation();
            } else if (isListening) {
                stopListening();
                setStatus("Paused", "default");
            } else {
                startListening();
            }
        });

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            stopListening();
            // We don't show the user's text on screen, we just process it.
            processInput(transcript);
        };

        recognition.onerror = (event) => {
            stopListening();
            setStatus("Didn't catch that", "default");
        };
        
        recognition.onend = () => {
            // Visual reset if not processing
            if (!isConversationActive && !synth.speaking) {
                setStatus("Tap to start", "default");
                micContainer.classList.remove('listening');
            }
        };

    </script>
</body>
</html>
